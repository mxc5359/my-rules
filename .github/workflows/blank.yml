name: Build MRS Rules

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Mihomo
        run: |
          LATEST=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          wget "https://github.com/MetaCubeX/mihomo/releases/download/${LATEST}/mihomo-linux-amd64-${LATEST}.gz"
          gunzip "mihomo-linux-amd64-${LATEST}.gz"
          chmod +x "mihomo-linux-amd64-${LATEST}"
          mv "mihomo-linux-amd64-${LATEST}" mihomo

      - name: Convert rules
        run: |
          # 去掉 DOMAIN, / DOMAIN-SUFFIX, 等前缀，过滤空行和注释
          sed 's/^DOMAIN[^,]*,//' gn.txt | sed '/^#/d' | sed '/^$/d' > domain_clean.txt

          # 去掉 IP-CIDR, 前缀和 ,no-resolve 后缀，过滤空行和注释
          sed 's/^IP-CIDR[^,]*,//' gnip.txt | sed 's/,no-resolve$//' | sed '/^#/d' | sed '/^$/d' > ipcidr_clean.txt

          ./mihomo convert-ruleset domain text domain_clean.txt gn.mrs
          ./mihomo convert-ruleset ipcidr text ipcidr_clean.txt gnip.mrs

      - name: Commit result
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add *.mrs
          git commit -m "update mrs" || echo "no changes"
          git push
