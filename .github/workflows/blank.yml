name: Build MRS Rules

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Mihomo
        run: |
          LATEST=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          wget "https://github.com/MetaCubeX/mihomo/releases/download/${LATEST}/mihomo-linux-amd64-${LATEST}.gz"
          gunzip "mihomo-linux-amd64-${LATEST}.gz"
          chmod +x "mihomo-linux-amd64-${LATEST}"
          mv "mihomo-linux-amd64-${LATEST}" mihomo

      - name: Convert rules
        run: |
          ./mihomo convert-ruleset domain text domain.txt domain.mrs
          ./mihomo convert-ruleset ipcidr text ipcidr.txt ipcidr.mrs

      - name: Commit result
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add *.mrs
          git commit -m "update mrs" || echo "no changes"
          git push
